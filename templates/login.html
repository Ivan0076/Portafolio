{% extends "base.html" %}
{% block title %}Acceso Privado — {{ profile.name }}{% endblock %}

{% block content %}
<section class="login-section">
  <div class="login-bg-art">
    <div class="login-orb login-orb-1"></div>
    <div class="login-orb login-orb-2"></div>
    <div class="login-grid"></div>
  </div>
  <div class="login-card">
    <div class="login-header">
      <div class="login-brand">◈</div>
      <h1 class="login-title">Acceso Privado</h1>
      <p class="login-subtitle">Panel exclusivo del autor</p>
    </div>

    {% if error %}
    <div class="login-error">
      <i class="bi bi-shield-exclamation me-2"></i>{{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}" class="login-form" autocomplete="off">
      <div class="login-field">
        <label for="username">Usuario</label>
        <div class="field-wrap">
          <i class="bi bi-person field-icon"></i>
          <input type="text" id="username" name="username" required
                 placeholder="Nombre de usuario" autocomplete="off"/>
        </div>
      </div>
      <div class="login-field">
        <label for="password">Contraseña</label>
        <div class="field-wrap">
          <i class="bi bi-lock field-icon"></i>
          <input type="password" id="password" name="password" required
                 placeholder="Contraseña secreta" autocomplete="new-password"/>
          <button type="button" class="toggle-pass" onclick="togglePass(this)">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="login-submit">
        <span>Entrar</span>
        <i class="bi bi-arrow-right ms-2"></i>
      </button>
    </form>

    <p class="login-note">
      <i class="bi bi-info-circle me-1"></i>
      Esta área está reservada únicamente para el administrador del sitio.
    </p>
  </div>
</section>

<script>
function togglePass(btn) {
  const input = btn.previousElementSibling ? btn.parentElement.querySelector('input') : null;
  const inp = document.getElementById('password');
  if (inp.type === 'password') {
    inp.type = 'text';
    btn.innerHTML = '<i class="bi bi-eye-slash"></i>';
  } else {
    inp.type = 'password';
    btn.innerHTML = '<i class="bi bi-eye"></i>';
  }
}
</script>
{% endblock %}
